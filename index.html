<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AI Expense Tracker</title>

  <!-- PWA -->

  <link
    rel="manifest"
    href="manifest.json"
  />

  <meta
    name="theme-color"
    content="#667eea"
  />

  <!-- CSS -->

  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- jsPDF -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

  <div class="background-blur"></div>

  <div class="container">

    <!-- HEADER -->

    <div class="top-bar glass-card">

      <div>

        <h1>AI Expense Tracker 🤖</h1>

        <p class="subtitle">
          Smart Financial Dashboard
        </p>

      </div>

      <div class="top-actions">

        <!-- LANGUAGE -->

        <select id="language-select">

          <option value="en">
            English
          </option>

          <option value="hi">
            हिन्दी
          </option>

        </select>

        <!-- DARK MODE -->

        <button id="theme-toggle">
          Dark Mode
        </button>

      </div>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

      <div class="stat-card glass-card">

        <h3>Total Expenses</h3>

        <h2>
          ₹<span id="total">0</span>
        </h2>

      </div>

      <div class="stat-card glass-card">

        <h3>Budget</h3>

        <h2>
          ₹<span id="budget-amount">0</span>
        </h2>

      </div>

      <div class="stat-card glass-card">

        <h3>Remaining</h3>

        <h2>
          ₹<span id="remaining">0</span>
        </h2>

      </div>

      <div class="stat-card glass-card">

        <h3>Health Score</h3>

        <h2>
          <span id="health-score">0</span>/100
        </h2>

      </div>

    </div>

    <!-- BUDGET -->

    <div class="glass-card section-card">

      <h2>Monthly Budget</h2>

      <div class="budget-box">

        <input
          type="number"
          id="budget"
          placeholder="Set Monthly Budget"
        />

        <button onclick="saveBudget()">
          Save Budget
        </button>

      </div>

      <div class="progress-container">

        <div id="progress-bar"></div>

      </div>

      <p id="alert"></p>

      <p id="health-message"></p>

    </div>

    <!-- ADD EXPENSE -->

    <div class="glass-card section-card">

      <h2>Add Expense</h2>

      <div class="form-container">

        <input
          type="text"
          id="title"
          placeholder="Expense Title"
        />

        <input
          type="number"
          id="amount"
          placeholder="Amount"
        />

        <input
          type="month"
          id="month"
        />

        <!-- CATEGORY -->

        <select id="category">

          <option value="Food">
            Food
          </option>

          <option value="Transport">
            Transport
          </option>

          <option value="Shopping">
            Shopping
          </option>

          <option value="Bills">
            Bills
          </option>

          <option value="Entertainment">
            Entertainment
          </option>

        </select>

        <!-- WALLET -->

        <select id="wallet">

          <option value="Cash">
            Cash
          </option>

          <option value="Bank">
            Bank
          </option>

          <option value="UPI">
            UPI
          </option>

          <option value="Credit Card">
            Credit Card
          </option>

        </select>

        <button onclick="addExpense()">
          Add Expense
        </button>

      </div>

    </div>

    <!-- SEARCH -->

    <div class="glass-card section-card">

      <h2>Search & Filter</h2>

      <input
        type="text"
        id="search"
        placeholder="Search Expenses..."
      />

      <!-- MONTH FILTER -->

      <select id="filter-month">

        <option value="all">
          All Months
        </option>

      </select>

    </div>

    <!-- CHARTS -->

    <div class="charts-grid">

      <div class="glass-card chart-card">

        <h2>Expense Distribution</h2>

        <canvas id="expenseChart"></canvas>

      </div>

      <div class="glass-card chart-card">

        <h2>Category Analytics</h2>

        <canvas id="barChart"></canvas>

      </div>

    </div>

    <!-- AI INSIGHTS -->

    <div class="glass-card section-card">

      <h2>AI Spending Insights 🤖</h2>

      <div id="insights"></div>

    </div>

    <!-- EXPENSE LIST -->

    <div class="glass-card section-card">

      <div class="expense-header">

        <h2>Recent Expenses</h2>

        <div class="buttons">

          <button onclick="downloadCSV()">
            Export CSV
          </button>

          <button onclick="downloadPDF()">
            Export PDF
          </button>

        </div>

      </div>

      <div id="expense-list"></div>

    </div>

  </div>

  <!-- JS -->

  <script src="script.js"></script>

</body>

</html>
